services:
  php:
    build:
      context: .
      dockerfile: ./Dockerfile
      target: php

  nginx:
    image: nginx:alpine
    depends_on:
      - php

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql

  node-front:
    build:
      context: .
      dockerfile: ./Dockerfile
      target: node-front

volumes:
  db_data: