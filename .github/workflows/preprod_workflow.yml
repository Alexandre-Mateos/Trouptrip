name: Deploy Staging

on:
  push:
    branches: [ "staging" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Aller dans le dossier du projet
            cd /opt/apps/trouptrip/preprod
            
            # 2. Récupérer les derniers changements
            git fetch origin staging
            git reset --hard origin/staging
            git clean -fd
            
            # 3. Re-construire l'image localement et relancer le conteneur
            docker compose -f docker-compose.yaml -f docker-compose.prod.yaml -p trouptrip-preprod  up -d --build
            
            # 4. Nettoyage des images inutilisées
            docker image prune -f